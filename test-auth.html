<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Auth test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
max-width:600px;
margin:auto;
padding:40px;
}

input,button{
width:100%;
padding:10px;
margin:6px 0;
}

pre{
background:#f4f4f4;
padding:12px;
border-radius:8px;
white-space:pre-wrap;
}
</style>

</head>
<body>

<h1>Supabase Auth test</h1>

<input id="email" type="email" placeholder="email">
<input id="password" type="password" placeholder="heslo">

<button id="loginBtn">Přihlásit</button>
<button id="logoutBtn">Odhlásit</button>
<button id="checkBtn">Zkontrolovat session</button>

<h2>Výstup</h2>
<pre id="out">Načítám...</pre>

<script>

const SUPABASE_URL="https://avjkkdfzzudtmlqolbzk.supabase.co"
const SUPABASE_KEY="SEM_VLOZ_TVUJ_ANON_PUBLIC_KEY"

const supabaseClient=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY,
{
auth:{
persistSession:true,
autoRefreshToken:true,
detectSessionInUrl:true
}
}
)

const out=document.getElementById("out")

function log(title,data){

out.textContent=
title+
"\n\n"+
JSON.stringify(data,null,2)

console.log(title,data)

}

async function showSession(source){

const {data,error}=await supabaseClient.auth.getSession()

const storageKeys=Object.keys(localStorage).filter(k=>
k.includes("supabase")||k.includes("auth")
)

const storageDump={}

for(const k of storageKeys){

storageDump[k]=localStorage.getItem(k)

}

log(source,{
session:data?.session||null,
user:data?.session?.user||null,
error:error||null,
storageKeys,
storageDump
})

}

document.getElementById("loginBtn").onclick=async()=>{

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,
password
})

log("LOGIN",{data,error})

await showSession("after login")

}

document.getElementById("logoutBtn").onclick=async()=>{

const {error}=await supabaseClient.auth.signOut()

log("LOGOUT",{error})

await showSession("after logout")

}

document.getElementById("checkBtn").onclick=async()=>{

await showSession("manual check")

}

supabaseClient.auth.onAuthStateChange(async(event,session)=>{

console.log("AUTH EVENT:",event)

await showSession("onAuthStateChange "+event)

})

showSession("page load")

</script>

</body>
</html>
