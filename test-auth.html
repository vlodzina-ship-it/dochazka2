<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Auth test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 14px;
    }

    pre {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <h1>Supabase Auth test</h1>

  <input id="email" type="email" placeholder="email">
  <input id="password" type="password" placeholder="heslo">

  <button onclick="login()">Přihlásit</button>
  <button onclick="logout()">Odhlásit</button>
  <button onclick="checkSession()">Zkontrolovat session</button>

  <h2>Výstup</h2>
  <pre id="output">Načítám...</pre>

  <script>
    const SUPABASE_URL = "https://avjkkdfzzudtmlqolbzk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_I8axbKcJOoZ5mhiixKxfTg_fM5dCCJ-";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY,
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      }
    );

    const output = document.getElementById("output");

    function print(title, data) {
      output.textContent = title + "\n\n" + JSON.stringify(data, null, 2);
      console.log(title, data);
    }

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      const storageKeys = Object.keys(localStorage).filter(
        key => key.includes("supabase") || key.includes("sb-") || key.includes("auth")
      );

      const storageDump = {};
      for (const key of storageKeys) {
        storageDump[key] = localStorage.getItem(key);
      }

      print("SESSION CHECK", {
        session: data?.session ?? null,
        user: data?.session?.user ?? null,
        error: error ?? null,
        storageKeys,
        storageDump
      });
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      print("LOGIN RESULT", { data, error });
      await checkSession();
    }

    async function logout() {
      const { error } = await supabaseClient.auth.signOut();

      print("LOGOUT", { error });
      await checkSession();
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      print("AUTH EVENT " + event, {
        session,
        user: session?.user ?? null
      });
    });

    checkSession();
  </script>
</body>
</html>
