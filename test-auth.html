<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Auth test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    input, button {
      padding: 10px;
      margin: 6px 0;
      width: 100%;
      max-width: 420px;
      display: block;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Supabase Auth test</h1>

  <input id="email" type="email" placeholder="email" />
  <input id="password" type="password" placeholder="heslo" />

  <button id="loginBtn">Přihlásit</button>
  <button id="logoutBtn">Odhlásit</button>
  <button id="checkBtn">Zkontrolovat session</button>

  <h2>Výstup</h2>
  <pre id="out">Načítám…</pre>

  <script>
    const SUPABASE_URL = "https://avjkkdfzzudtmlqolbzk.supabase.co";
    const SUPABASE_KEY = "SEM_VLOZ_PRESNY_ANON_PUBLIC_KEY";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const out = document.getElementById("out");

    function log(title, value) {
      const text = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      out.textContent = `${title}\n${text}`;
      console.log(title, value);
    }

    async function showState(source = "manual") {
      const { data, error } = await supabase.auth.getSession();

      const storageKeys = Object.keys(localStorage).filter(k =>
        k.includes("supabase") || k.includes("auth")
      );

      const storageDump = {};
      for (const key of storageKeys) {
        storageDump[key] = localStorage.getItem(key);
      }

      log(`Zdroj: ${source}`, {
        href: location.href,
        session: data?.session ?? null,
        user: data?.session?.user ?? null,
        error: error ?? null,
        storageKeys,
        storageDump
      });
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      log("LOGIN", { data, error });
      await showState("after login");
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      const { error } = await supabase.auth.signOut();
      log("LOGOUT", { error });
      await showState("after logout");
    });

    document.getElementById("checkBtn").addEventListener("click", async () => {
      await showState("check button");
    });

    supabase.auth.onAuthStateChange(async (event, session) => {
      console.log("AUTH EVENT:", event, session);
      await showState(`onAuthStateChange: ${event}`);
    });

    showState("page load");
  </script>
</body>
</html>
