<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Docházka</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
button { padding:6px 10px; margin:2px; cursor:pointer; }
input, select { padding:5px; margin:2px; }
.pending { color:orange; }
.approved { color:green; }
</style>
</head>

<body>

<h2>Docházka – ADMIN</h2>

<div class="card">
<h3>Žádosti o dovolenou</h3>
<div id="leaveRequests"></div>
</div>

<div class="card">
<h3>Docházka zaměstnance</h3>

<select id="employeeSelect"></select>
<button onclick="loadAttendance()">Načíst</button>

<div id="attendance"></div>

<h4>Přidat záznam</h4>
<input type="date" id="new_date">
<input type="time" id="new_from">
<input type="time" id="new_to">
<input type="number" id="new_break" placeholder="pauza">
<button onclick="addAttendance()">Přidat</button>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://avjkkdfzzudtmlqolbzk.supabase.co",
  "TVŮJ_PUBLIC_ANON_KEY"
);

let selectedEmployee = null;

async function loadEmployees(){
  const { data } = await supabase.from("employees").select("*");
  const sel = document.getElementById("employeeSelect");
  sel.innerHTML = "";

  data.forEach(e=>{
    const o = document.createElement("option");
    o.value = e.id;
    o.textContent = e.name;
    sel.appendChild(o);
  });
}

document.getElementById("employeeSelect").onchange = e=>{
  selectedEmployee = e.target.value;
};

async function loadLeaveRequests(){
  const { data } = await supabase.from("leave_requests").select("*").order("id",{ascending:false});
  const div = document.getElementById("leaveRequests");
  div.innerHTML = "";

  data.forEach(r=>{
    const el = document.createElement("div");
    el.innerHTML = `
      ${r.date_from} → ${r.date_to}
      <b class="${r.status}">${r.status}</b>
      ${r.status==="pending" ? `<button onclick="approve(${r.id})">Schválit</button>`:""}
    `;
    div.appendChild(el);
  });
}

async function approve(id){
  await supabase.rpc("approve_leave_request",{p_request_id:id});
  loadLeaveRequests();
  loadAttendance();
}

async function loadAttendance(){
  if(!selectedEmployee) return;

  const { data } = await supabase
    .from("attendance")
    .select("*")
    .eq("employee_id",selectedEmployee)
    .order("date",{ascending:false});

  const div = document.getElementById("attendance");
  div.innerHTML = "";

  data.forEach(a=>{
    const row = document.createElement("div");

    row.innerHTML = `
      <input type="date" value="${a.date}" id="d_${a.id}">
      <input type="time" value="${a.time_from||''}" id="f_${a.id}">
      <input type="time" value="${a.time_to||''}" id="t_${a.id}">
      <input type="number" value="${a.break_minutes||0}" id="b_${a.id}">
      <b>${a.type}</b>
      <button onclick="save(${a.id})">Uložit</button>
    `;

    div.appendChild(row);
  });
}

async function save(id){
  const date = document.getElementById("d_"+id).value;
  const from = document.getElementById("f_"+id).value;
  const to = document.getElementById("t_"+id).value;
  const br = document.getElementById("b_"+id).value;

  await supabase.rpc("admin_update_attendance",{
    p_attendance_id:id,
    p_date:date,
    p_office_id:null,
    p_type:null,
    p_time_from:from,
    p_time_to:to,
    p_break_minutes:parseInt(br)
  });

  alert("Uloženo");
}

async function addAttendance(){
  const date = document.getElementById("new_date").value;
  const from = document.getElementById("new_from").value;
  const to = document.getElementById("new_to").value;
  const br = document.getElementById("new_break").value;

  await supabase.rpc("admin_insert_attendance",{
    p_employee_id:selectedEmployee,
    p_date:date,
    p_office_id:null,
    p_type:"práce",
    p_time_from:from,
    p_time_to:to,
    p_break_minutes:parseInt(br||0)
  });

  loadAttendance();
}

loadEmployees();
loadLeaveRequests();

</script>

</body>
</html>
