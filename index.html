<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Docházkový systém</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f6f7fb;
margin:0;
padding:40px;
}

.box{
max-width:420px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

input,button{
width:100%;
padding:10px;
margin-top:8px;
}

button{
background:#0f172a;
color:white;
border:none;
cursor:pointer;
}

.logout{
background:#64748b;
}

</style>

</head>

<body>

<div class="box">

<h2>Docházkový systém</h2>

<div id="loginBox">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="heslo">

<button id="loginBtn">Přihlásit</button>

</div>

<div id="appBox" style="display:none">

<p>Přihlášen: <b id="userEmail"></b></p>

<button class="logout" id="logoutBtn">Odhlásit</button>

</div>

</div>

<script>

const SUPABASE_URL="https://avjkkdfzzudtmlqolbzk.supabase.co"

const SUPABASE_KEY="sb_publishable_I8axbKcJOoZ5mhiixKxfTg_fM5dCCJ-"

const supabaseClient = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY,
{
auth:{
persistSession:true,
autoRefreshToken:true,
detectSessionInUrl:true
}
}
)

const loginBox=document.getElementById("loginBox")
const appBox=document.getElementById("appBox")
const userEmail=document.getElementById("userEmail")

function showLogin(){

loginBox.style.display="block"
appBox.style.display="none"

}

function showApp(user){

loginBox.style.display="none"
appBox.style.display="block"
userEmail.innerText=user.email

}

document.getElementById("loginBtn").onclick = async () => {

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signInWithPassword({
email,
password
})

if(error){

alert(error.message)

return

}

}

document.getElementById("logoutBtn").onclick = async () => {

await supabaseClient.auth.signOut()

}

supabaseClient.auth.onAuthStateChange((event,session)=>{

if(session){

showApp(session.user)

}else{

showLogin()

}

})

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(data.session){

showApp(data.session.user)

}else{

showLogin()

}

}

init()

</script>

</body>
</html>
