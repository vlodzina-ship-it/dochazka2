<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Docházkový systém</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:40px;
background:#f6f7fb;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

input,button{
width:100%;
padding:10px;
margin-top:8px;
}

button{
cursor:pointer;
background:#0f172a;
color:white;
border:none;
}

.logout{
background:#64748b;
}

.status{
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>Docházkový systém</h2>

<div id="loginBox">

<input id="email" type="email" placeholder="email">

<input id="password" type="password" placeholder="heslo">

<button onclick="login()">Přihlásit</button>

</div>

<div id="appBox" style="display:none">

<p><b>Přihlášen:</b> <span id="userEmail"></span></p>

<button class="logout" onclick="logout()">Odhlásit</button>

</div>

<div class="status" id="status"></div>

</div>

<script>

const SUPABASE_URL="https://avjkkdfzzudtmlqolbzk.supabase.co"

const SUPABASE_KEY="sb_publishable_I8axbKcJOoZ5mhiixKxfTg_fM5dCCJ-"

const supabase=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY,
{
auth:{
persistSession:true,
autoRefreshToken:true,
detectSessionInUrl:true
}
}
)

const status=document.getElementById("status")

function setStatus(text){

status.innerText=text

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

setStatus("Přihlašuji...")

const {data,error}=await supabase.auth.signInWithPassword({
email,
password
})

if(error){

setStatus("Chyba: "+error.message)

return

}

setStatus("Přihlášeno")

}

async function logout(){

await supabase.auth.signOut()

setStatus("Odhlášeno")

}

function showApp(user){

document.getElementById("loginBox").style.display="none"

document.getElementById("appBox").style.display="block"

document.getElementById("userEmail").innerText=user.email

}

function showLogin(){

document.getElementById("loginBox").style.display="block"

document.getElementById("appBox").style.display="none"

}

supabase.auth.onAuthStateChange((event,session)=>{

console.log("AUTH EVENT",event)

if(session){

showApp(session.user)

}else{

showLogin()

}

})

async function init(){

const {data}=await supabase.auth.getSession()

if(data.session){

showApp(data.session.user)

}else{

showLogin()

}

}

init()

</script>

</body>
</html>
