<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docházkový systém</title>

  <meta name="theme-color" content="#2563eb" />

  <link rel="stylesheet" href="./styles.css?v=2026-04-13-1" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginView" class="login-wrap">
    <div class="card">
      <h1>Přihlášení</h1>

      <label>E-mail</label>
      <input id="email" type="email" />

      <label>Heslo</label>
      <input id="password" type="password" />

      <button id="loginBtn">Přihlásit</button>

      <div id="loginMessage" class="message warn"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">

    <div class="topbar">
      <div id="sessionText"></div>
      <button id="logoutBtn">Odhlásit</button>
    </div>

    <div class="grid grid-main">

      <!-- LEVÁ STRANA -->
      <div class="stack">

        <!-- PROFIL -->
        <div class="card">
          <h2>Můj profil</h2>
          <div id="profileBox"></div>
        </div>

        <!-- DOCHÁZKA -->
        <div class="card">
          <h2>Příchod / Odchod</h2>

          <label>Místo</label>
          <select id="office"></select>

          <label>Typ</label>
          <select id="attendanceType">
            <option value="práce">práce</option>
            <option value="home office">home office</option>
            <option value="služební cesta">služební cesta</option>
          </select>

          <div style="margin-top:10px;">
            <button id="checkInBtn">Příchod</button>
            <button id="checkOutBtn">Odchod</button>
          </div>

          <div id="attendanceMessage" class="message warn"></div>
        </div>

      </div>

      <!-- PRAVÁ STRANA -->
      <div class="stack">

        <!-- ZAMĚSTNANCI -->
        <div class="card">
          <h2>Nový zaměstnanec</h2>

          <label>Jméno</label>
          <input id="newEmployeeName" type="text" />

          <label>E-mail</label>
          <input id="newEmployeeEmail" type="email" />

          <!-- 🔥 KLÍČOVÉ POLE -->
          <label>Dočasné heslo</label>
          <input id="newEmployeePassword" type="text" value="Test123456" />

          <label>Role</label>
          <select id="newEmployeeRole">
            <option value="employee">employee</option>
            <option value="admin">admin</option>
          </select>

          <label>Offices</label>
          <input id="newEmployeeOffices" type="text" />

          <label>Úvazek</label>
          <input id="newEmployeeWeekly" type="text" />

          <label>Dovolená dny</label>
          <input id="newEmployeeLeaveDays" type="number" value="20" />

          <label>Dovolená hodiny</label>
          <input id="newEmployeeLeaveHours" type="number" value="160" />

          <label>Aktivní</label>
          <select id="newEmployeeActive">
            <option value="true">ano</option>
            <option value="false">ne</option>
          </select>

          <div style="margin-top:10px;">
            <button id="createEmployeeBtn">Přidat zaměstnance</button>
          </div>

          <div id="createEmployeeMessage" class="message warn"></div>
        </div>

        <!-- SEZNAM -->
        <div class="card">
          <h2>Zaměstnanci</h2>
          <div id="employeesWrap"></div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="./config.js"></script>
<script src="./app.js"></script>

</body>
</html>
